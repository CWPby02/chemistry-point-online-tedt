<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — CPES</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
</head>
<body style="background: linear-gradient(135deg, #f0f2ff, #e8ecff);min-height:100vh;display:flex;align-items:center;justify-content:center;">

  <div class="container" style="max-width: 420px;">
    <div class="glass-card">
      <div style="text-align:center;margin-bottom:24px;">
        <span class="material-symbols-rounded" style="font-size:3rem;color:var(--color-primary);">admin_panel_settings</span>
        <h2 style="margin:4px 0;">Admin Login</h2>
        <p class="text-muted">Enter your credentials to manage CPES.</p>
      </div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" class="form-control" placeholder="admin@cpes.com" required />
        </div>
        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn--primary btn--block btn--lg">
          <span class="material-symbols-rounded">login</span> Login
        </button>
      </form>

      <div id="loginMessage" style="margin-top:16px;"></div>
    </div>
    <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--color-text-light);">
      <a href="../index.html">← Back to Home</a>
    </p>
  </div>

  <script>
    // ---------- Firebase Config (आपका अपना) ----------
    const firebaseConfig = {
      apiKey: "AIzaSyAJxrqXisH2oBk8naB7TJMnGsoO2RIm6Tg",
      authDomain: "cpes-a88a2.firebaseapp.com",
      databaseURL: "https://cpes-a88a2-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cpes-a88a2",
      storageBucket: "cpes-a88a2.firebasestorage.app",
      messagingSenderId: "350376945623",
      appId: "1:350376945623:web:eb884eb5cdac3f05aa0d92"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ---------- Form Submit Handler ----------
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault(); // यह refresh रोकेगा

      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value.trim();
      const message = document.getElementById('loginMessage');

      if (!email || !password) {
        message.innerHTML = '<div class="alert alert--error">Please fill in all fields.</div>';
        return;
      }

      message.innerHTML = '<div class="alert alert--info">Logging in...</div>';

      // Firebase Authentication
      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          message.innerHTML = '<div class="alert alert--success">✅ Login successful! Redirecting...</div>';
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1200);
        })
        .catch((error) => {
          message.innerHTML = `<div class="alert alert--error">❌ ${error.message}</div>`;
        });
    });
  </script>

</body>
</html>
