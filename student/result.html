<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result — CPES</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    /* Same as before, plus print styles */
    .result-score { font-size:4rem; font-weight:var(--font-weight-bold); color:var(--color-primary); }
    .result-grade { font-size:2.5rem; font-weight:var(--font-weight-bold); color:var(--color-primary); margin-top:4px; }
    .result-details { display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin:16px 0; }
    .result-details strong { display:block; font-size:1.6rem; }
    .result-details .correct strong { color:var(--color-success); }
    .result-details .wrong strong { color:var(--color-danger); }
    .question-review { margin:16px 0; text-align:left; background:var(--color-bg); border-radius:var(--radius-md); padding:12px 16px; max-height:300px; overflow-y:auto; }
    .question-review .q-item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--color-border); }
    .question-review .q-item:last-child { border-bottom:none; }
    .q-item .status { font-weight:var(--font-weight-bold); }
    .q-item .status.correct { color:var(--color-success); }
    .q-item .status.wrong { color:var(--color-danger); }

    /* Certificate styles (responsive) */
    .certificate-wrapper {
      margin-top: 24px;
      padding: 12px;
      background: #e8e0d0;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      box-shadow: var(--shadow-md);
    }

    .certificate-box {
      width: 100%;
      max-width: 820px;
      background: #fffdf7;
      padding: 20px 24px 18px;
      border-radius: 16px;
      border: 8px double #b8860b;
      position: relative;
      box-shadow: 0 0 0 3px #b8860b inset, 0 0 0 6px #f5e6c8 inset;
      text-align: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      min-height: 480px;
    }

    .certificate-box::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      border: 2px solid #d4a843;
      border-radius: 10px;
      pointer-events: none;
    }

    .cert-top { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #b8860b; padding-bottom:4px; margin-bottom:2px; }
    .cert-top .cert-logo { font-size:2rem; color:#b8860b; }
    .cert-top .cert-serial { font-size:0.7rem; color:#999; font-family:'Courier New',monospace; background:#f5f0e8; padding:2px 12px; border-radius:12px; }

    .cert-institute { font-size:1.6rem; font-weight:bold; color:#1a1a2e; letter-spacing:2px; margin-top:2px; }
    .cert-institute span { color:#b8860b; }
    .cert-subtitle { font-size:0.8rem; color:#777; letter-spacing:4px; text-transform:uppercase; margin-top:-2px; }

    .cert-main-title { font-size:2rem; font-weight:bold; color:#1a1a2e; letter-spacing:5px; text-transform:uppercase; border-top:2px solid #b8860b; border-bottom:2px solid #b8860b; display:inline-block; padding:2px 24px; margin:4px auto 6px; background:linear-gradient(135deg,#fdf6e3,#f5e6c8); }

    .cert-student-name { font-size:2rem; font-weight:bold; color:#1a1a2e; margin:2px 0 2px; border-bottom:3px dashed #d4a843; display:inline-block; padding:0 20px 4px; letter-spacing:2px; }

    .cert-completion-text { font-size:0.95rem; color:#333; margin:4px 0 4px; }
    .cert-completion-text strong { color:#1a1a2e; font-size:1.05rem; }

    .cert-details-row { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin:4px 0 6px; font-size:0.85rem; color:#444; }
    .cert-details-row span { background:#f8f4ec; padding:2px 14px; border-radius:20px; border:1px solid #e0d5c0; }
    .cert-details-row strong { color:#1a1a2e; }

    .cert-grade-badge { display:inline-block; background:linear-gradient(135deg,#b8860b,#d4a843); color:#fff; font-size:1.8rem; font-weight:bold; padding:2px 28px; border-radius:10px; margin:2px 0 6px; letter-spacing:3px; box-shadow:0 2px 8px rgba(184,134,11,0.3); }

    .cert-footer { border-top:2px solid #e0d5c0; padding-top:8px; display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; color:#555; flex-wrap:wrap; gap:6px; }
    .cert-footer .cert-director { font-weight:bold; color:#1a1a2e; text-align:left; }
    .cert-footer .cert-director small { font-weight:normal; color:#777; display:block; font-size:0.65rem; }
    .cert-footer .cert-seal { font-size:2rem; color:#b8860b; opacity:0.5; }
    .cert-footer .cert-date { font-size:0.75rem; color:#888; text-align:right; }

    .cert-stamp { position:absolute; bottom:50px; right:35px; width:80px; height:80px; border-radius:50%; border:3px solid rgba(184,134,11,0.25); display:flex; align-items:center; justify-content:center; font-size:0.55rem; color:rgba(184,134,11,0.35); font-weight:bold; text-transform:uppercase; transform:rotate(-18deg); pointer-events:none; background:rgba(184,134,11,0.04); font-family:'Georgia',serif; padding:8px; text-align:center; line-height:1.3; }

    .cert-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
    .no-result { text-align:center; padding:40px 20px; }
    .no-result .material-symbols-rounded { font-size:4rem; color:var(--color-warning); }

    @media (max-width:600px) {
      .certificate-box { padding:14px 12px 12px; min-height:400px; }
      .cert-main-title { font-size:1.2rem; letter-spacing:3px; padding:2px 12px; }
      .cert-student-name { font-size:1.4rem; padding:0 12px 2px; }
      .cert-institute { font-size:1.2rem; }
      .cert-grade-badge { font-size:1.2rem; padding:2px 14px; }
      .cert-stamp { width:50px; height:50px; font-size:0.4rem; bottom:30px; right:15px; padding:4px; }
      .cert-footer { flex-direction:column; text-align:center; }
      .cert-footer .cert-director { text-align:center; }
      .cert-footer .cert-date { text-align:center; }
      .cert-details-row { gap:8px; font-size:0.75rem; }
      .cert-details-row span { padding:2px 10px; }
      .cert-top .cert-logo { font-size:1.5rem; }
      .cert-top .cert-serial { font-size:0.6rem; }
      .cert-completion-text { font-size:0.85rem; }
    }

    /* Print styles – hide everything except certificate */
    @media print {
      body * {
        visibility: hidden;
      }
      #certificateWrapper, #certificateWrapper * {
        visibility: visible;
      }
      #certificateWrapper {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        padding: 0;
        margin: 0;
        background: white;
        box-shadow: none;
        border-radius: 0;
      }
      .certificate-box {
        border: 6px double #b8860b !important;
        box-shadow: none !important;
        min-height: auto !important;
        padding: 20px !important;
      }
      .cert-actions, .result-score, .result-grade, .result-details, .question-review, .no-result {
        display: none !important;
      }
      .certificate-wrapper {
        display: block !important;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar__container container">
      <a href="../index.html" class="navbar__brand">
        <span class="navbar__logo-icon material-symbols-rounded">science</span>
        <span class="navbar__brand-text">CPES</span>
      </a>
      <a href="../index.html" class="btn btn--outline btn--sm">Home</a>
    </div>
  </header>

  <main style="padding:30px 0;">
    <div class="container" style="max-width:860px;">
      <div class="glass-card" id="resultContainer">
        <div id="resultContent">
          <div class="no-result">
            <span class="material-symbols-rounded">hourglass_empty</span>
            <h3>No result found</h3>
            <p class="text-muted">Please complete a quiz first.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAJxrqXisH2oBk8naB7TJMnGsoO2RIm6Tg",
      authDomain: "cpes-a88a2.firebaseapp.com",
      databaseURL: "https://cpes-a88a2-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cpes-a88a2",
      storageBucket: "cpes-a88a2.firebasestorage.app",
      messagingSenderId: "350376945623",
      appId: "1:350376945623:web:eb884eb5cdac3f05aa0d92"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==========================================================
    // LOAD RESULT
    // ==========================================================
    function loadResult() {
      const container = document.getElementById('resultContent');
      const resultJSON = localStorage.getItem('cpes_result');
      if (!resultJSON) {
        container.innerHTML = `<div class="no-result"><span class="material-symbols-rounded">hourglass_empty</span><h3>No result found</h3><p class="text-muted">Please complete a quiz first.</p></div>`;
        return;
      }
      try {
        const result = JSON.parse(resultJSON);
        const { studentName, total, correct, wrong, score, grade, detailed, quizId, timestamp } = result;
        const percentage = Math.round((correct / total) * 100);
        let quizTitle = 'Chemistry Quiz';
        db.collection('quizzes').doc(quizId).get().then(doc => {
          if (doc.exists) quizTitle = doc.data().title || 'Chemistry Quiz';
          renderResult(quizTitle);
        }).catch(() => renderResult(quizTitle));

        function renderResult(title) {
          let reviewHtml = '';
          if (detailed && detailed.length) {
            reviewHtml = '<div class="question-review"><h4>📝 Question Review</h4>';
            detailed.forEach((item, idx) => {
              const statusClass = item.isCorrect ? 'correct' : 'wrong';
              const statusText = item.isCorrect ? '✅ Correct' : '❌ Wrong';
              reviewHtml += `<div class="q-item"><span><strong>Q${idx+1}</strong> (Your Answer: ${item.userAnswer !== undefined ? item.userAnswer : 'N/A'})</span><span class="status ${statusClass}">${statusText}</span></div>`;
            });
            reviewHtml += '</div>';
          }
          const dateStr = new Date(timestamp || Date.now()).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });

          container.innerHTML = `
            <div class="result-score">${percentage}%</div>
            <div class="result-grade">${grade || 'N/A'}</div>
            <div class="result-details">
              <span class="correct"><strong>${correct}</strong> Correct</span>
              <span class="wrong"><strong>${wrong}</strong> Wrong</span>
              <span class="total"><strong>${total}</strong> Total</span>
            </div>
            <p style="color:var(--color-text-secondary);margin-bottom:12px;">
              ${percentage >= 70 ? '🎉 Excellent! You\'ve passed with flying colors.' : percentage >= 40 ? '👍 Good effort! Keep practicing.' : '📚 Don\'t give up! Review and try again.'}
            </p>
            ${reviewHtml}

            <div class="certificate-wrapper" id="certificateWrapper">
              <div class="certificate-box" id="certificateBox">
                <div class="cert-top">
                  <span class="cert-logo">⚗️</span>
                  <span class="cert-serial">#CPES-${String(Date.now()).slice(-6)}</span>
                </div>
                <div class="cert-institute">Chemistry Point <span>⚡</span></div>
                <div class="cert-subtitle">by Pradeep Sir</div>
                <div class="cert-main-title">Certificate of Completion</div>
                <div class="cert-student-name">${studentName || 'Student'}</div>
                <div class="cert-completion-text">has successfully completed the <strong>${title}</strong></div>
                <div class="cert-details-row">
                  <span>📊 Score: <strong>${percentage}%</strong></span>
                  <span>✅ Correct: <strong>${correct}</strong></span>
                  <span>📅 Date: <strong>${dateStr}</strong></span>
                </div>
                <div class="cert-grade-badge">Grade: ${grade || 'N/A'}</div>
                <div class="cert-footer">
                  <div class="cert-director">👨‍🏫 Pradeep Sir <small>Director, Chemistry Point</small></div>
                  <div class="cert-seal">🏅</div>
                  <div class="cert-date">Issued: ${dateStr}</div>
                </div>
                <div class="cert-stamp">Chemistry Point<br>Pradeep Sir</div>
              </div>
            </div>

            <div class="cert-actions">
              <button class="btn btn--primary" onclick="downloadPNG()"><span class="material-symbols-rounded">image</span> PNG</button>
              <button class="btn btn--primary" onclick="downloadPDF()"><span class="material-symbols-rounded">picture_as_pdf</span> PDF</button>
              <button class="btn btn--primary" onclick="printCertificate()"><span class="material-symbols-rounded">print</span> Print</button>
              <button class="btn btn--primary" onclick="shareCertificate()"><span class="material-symbols-rounded">share</span> Share</button>
            </div>
          `;
        }
      } catch (e) {
        container.innerHTML = `<p style="color:var(--color-danger);">Error loading result: ${e.message}</p>`;
      }
    }

    // ==========================================================
    // DOWNLOAD FUNCTIONS
    // ==========================================================
    function downloadPNG() {
      const el = document.getElementById('certificateBox');
      const rect = el.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      const dpr = window.devicePixelRatio || 1;
      const scale = Math.min(dpr * 2, 4);
      html2canvas(el, {
        scale: scale,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
        width: width,
        height: height,
        windowWidth: width,
        windowHeight: height
      }).then(canvas => {
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = width * scale;
        finalCanvas.height = height * scale;
        const ctx = finalCanvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(canvas, 0, 0, finalCanvas.width, finalCanvas.height);
        const link = document.createElement('a');
        link.download = `Certificate_${Date.now()}.png`;
        link.href = finalCanvas.toDataURL('image/png', 1.0);
        link.click();
      }).catch(err => alert('PNG error: ' + err.message));
    }

    function downloadPDF() {
      const el = document.getElementById('certificateBox');
      const rect = el.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      const dpr = window.devicePixelRatio || 1;
      const scale = Math.min(dpr * 2, 4);
      html2canvas(el, {
        scale: scale,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
        width: width,
        height: height,
        windowWidth: width,
        windowHeight: height
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/png', 1.0);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');
        const pdfWidth = 277;
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        const x = (297 - pdfWidth) / 2;
        const y = (210 - pdfHeight) / 2;
        pdf.addImage(imgData, 'PNG', x, y, pdfWidth, pdfHeight);
        pdf.save(`Certificate_${Date.now()}.pdf`);
      }).catch(err => alert('PDF error: ' + err.message));
    }

    // ==========================================================
    // PRINT
    // ==========================================================
    function printCertificate() {
      window.print();
    }

    // ==========================================================
    // SHARE (Web Share API)
    // ==========================================================
    function shareCertificate() {
      const el = document.getElementById('certificateBox');
      const rect = el.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      const dpr = window.devicePixelRatio || 1;
      const scale = Math.min(dpr * 2, 4);
      html2canvas(el, {
        scale: scale,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
        width: width,
        height: height,
        windowWidth: width,
        windowHeight: height
      }).then(canvas => {
        // Convert canvas to blob
        canvas.toBlob(function(blob) {
          if (!blob) {
            alert('Unable to generate image for sharing.');
            return;
          }
          // Check if Web Share API is supported
          if (navigator.share) {
            const file = new File([blob], `Certificate_${Date.now()}.png`, { type: 'image/png' });
            navigator.share({
              title: 'My Certificate - Chemistry Point',
              text: 'Check out my certificate from Chemistry Point Examination System!',
              files: [file]
            }).catch(err => {
              if (err.name !== 'AbortError') {
                alert('Share failed: ' + err.message);
              }
            });
          } else {
            // Fallback: download the image and let user share manually
            const link = document.createElement('a');
            link.download = `Certificate_${Date.now()}.png`;
            link.href = URL.createObjectURL(blob);
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
            alert('Your browser does not support direct sharing. The image has been downloaded. You can now share it manually.');
          }
        }, 'image/png', 1.0);
      }).catch(err => alert('Share error: ' + err.message));
    }

    // ==========================================================
    // INIT
    // ==========================================================
    loadResult();
  </script>
</body>
</html>
