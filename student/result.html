<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result — CPES</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    .result-score { font-size:4rem; font-weight:var(--font-weight-bold); color:var(--color-primary); }
    .result-grade { font-size:2.5rem; font-weight:var(--font-weight-bold); color:var(--color-primary); margin-top:4px; }
    .result-details { display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin:16px 0; }
    .result-details strong { display:block; font-size:1.6rem; }
    .result-details .correct strong { color:var(--color-success); }
    .result-details .wrong strong { color:var(--color-danger); }
    .question-review { margin:16px 0; text-align:left; background:var(--color-bg); border-radius:var(--radius-md); padding:12px 16px; max-height:300px; overflow-y:auto; }
    .question-review .q-item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--color-border); }
    .question-review .q-item:last-child { border-bottom:none; }
    .q-item .status { font-weight:var(--font-weight-bold); }
    .q-item .status.correct { color:var(--color-success); }
    .q-item .status.wrong { color:var(--color-danger); }

    /* ==========================================================
       NEW CERTIFICATE DESIGN
       ========================================================== */
    .certificate-wrapper {
      margin-top: 24px;
      padding: 16px;
      background: linear-gradient(135deg, #f5f0e1, #e8dcc8);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      display: flex;
      justify-content: center;
    }

    .certificate-box {
      width: 100%;
      max-width: 720px;
      background: #fff;
      padding: 32px 36px 28px;
      border-radius: 12px;
      border: 6px double #b8860b;
      position: relative;
      box-shadow: 0 0 0 2px #b8860b inset, 0 0 0 4px #f5e6c8 inset;
      text-align: center;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* Decorative border inner */
    .certificate-box::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 2px solid #d4a843;
      border-radius: 8px;
      pointer-events: none;
    }

    /* Top decoration */
    .certificate-box .cert-top-decoration {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      border-bottom: 2px solid #b8860b;
      padding-bottom: 6px;
    }
    .certificate-box .cert-top-decoration .cert-logo {
      font-size: 2rem;
      color: #b8860b;
    }
    .certificate-box .cert-top-decoration .cert-serial {
      font-size: 0.7rem;
      color: #999;
      font-family: 'Courier New', monospace;
    }

    /* Institute Name */
    .certificate-box .cert-institute {
      font-size: 1.6rem;
      font-weight: bold;
      color: #1a1a2e;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .certificate-box .cert-institute span {
      color: #b8860b;
    }

    /* Subtitle */
    .certificate-box .cert-subtitle {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Main title */
    .certificate-box .cert-main-title {
      font-size: 2rem;
      font-weight: bold;
      color: #1a1a2e;
      letter-spacing: 6px;
      text-transform: uppercase;
      border-top: 2px solid #b8860b;
      border-bottom: 2px solid #b8860b;
      display: inline-block;
      padding: 4px 24px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fdf6e3, #f5e6c8);
    }

    /* Student name */
    .certificate-box .cert-student-name {
      font-size: 2rem;
      font-weight: bold;
      color: #1a1a2e;
      margin: 6px 0 4px;
      border-bottom: 2px dashed #d4a843;
      display: inline-block;
      padding: 0 20px 4px;
    }

    /* Completion text */
    .certificate-box .cert-completion-text {
      font-size: 0.95rem;
      color: #333;
      margin: 6px 0;
    }

    .certificate-box .cert-completion-text strong {
      color: #1a1a2e;
      font-size: 1.05rem;
    }

    /* Details row */
    .certificate-box .cert-details-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 8px 0 12px;
      font-size: 0.9rem;
      color: #444;
    }
    .certificate-box .cert-details-row span {
      background: #f8f4ec;
      padding: 2px 14px;
      border-radius: 20px;
      border: 1px solid #e0d5c0;
    }
    .certificate-box .cert-details-row strong {
      color: #1a1a2e;
    }

    /* Grade badge */
    .certificate-box .cert-grade-badge {
      display: inline-block;
      background: linear-gradient(135deg, #b8860b, #d4a843);
      color: #fff;
      font-size: 1.8rem;
      font-weight: bold;
      padding: 2px 24px;
      border-radius: 8px;
      margin: 6px 0 10px;
      letter-spacing: 2px;
    }

    /* Footer */
    .certificate-box .cert-footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #e0d5c0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #555;
      flex-wrap: wrap;
      gap: 8px;
    }
    .certificate-box .cert-footer .cert-director {
      font-weight: bold;
      color: #1a1a2e;
    }
    .certificate-box .cert-footer .cert-director small {
      font-weight: normal;
      color: #777;
      display: block;
      font-size: 0.7rem;
    }
    .certificate-box .cert-footer .cert-seal {
      font-size: 2.2rem;
      color: #b8860b;
      opacity: 0.7;
    }
    .certificate-box .cert-footer .cert-date {
      font-size: 0.8rem;
      color: #888;
    }

    /* Stamp / Seal overlay */
    .certificate-box .cert-stamp {
      position: absolute;
      bottom: 50px;
      right: 40px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid rgba(184, 134, 11, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: rgba(184, 134, 11, 0.4);
      font-weight: bold;
      text-transform: uppercase;
      transform: rotate(-15deg);
      pointer-events: none;
      background: rgba(184, 134, 11, 0.05);
      font-family: 'Georgia', serif;
      padding: 10px;
      text-align: center;
      line-height: 1.2;
    }

    /* Download buttons */
    .cert-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .no-result {
      text-align: center;
      padding: 40px 20px;
    }
    .no-result .material-symbols-rounded {
      font-size: 4rem;
      color: var(--color-warning);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .certificate-box {
        padding: 20px 16px 16px;
      }
      .certificate-box .cert-main-title {
        font-size: 1.4rem;
        letter-spacing: 3px;
        padding: 2px 12px;
      }
      .certificate-box .cert-student-name {
        font-size: 1.4rem;
      }
      .certificate-box .cert-institute {
        font-size: 1.2rem;
      }
      .certificate-box .cert-footer {
        flex-direction: column;
        text-align: center;
      }
      .certificate-box .cert-stamp {
        width: 50px;
        height: 50px;
        font-size: 0.4rem;
        bottom: 30px;
        right: 20px;
      }
      .certificate-box .cert-grade-badge {
        font-size: 1.2rem;
        padding: 2px 14px;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar__container container">
      <a href="../index.html" class="navbar__brand">
        <span class="navbar__logo-icon material-symbols-rounded">science</span>
        <span class="navbar__brand-text">CPES</span>
      </a>
      <a href="../index.html" class="btn btn--outline btn--sm">Home</a>
    </div>
  </header>

  <main style="padding:30px 0;">
    <div class="container" style="max-width:820px;">
      <div class="glass-card" id="resultContainer">
        <div id="resultContent">
          <div class="no-result">
            <span class="material-symbols-rounded">hourglass_empty</span>
            <h3>No result found</h3>
            <p class="text-muted">Please complete a quiz first.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAJxrqXisH2oBk8naB7TJMnGsoO2RIm6Tg",
      authDomain: "cpes-a88a2.firebaseapp.com",
      databaseURL: "https://cpes-a88a2-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cpes-a88a2",
      storageBucket: "cpes-a88a2.firebasestorage.app",
      messagingSenderId: "350376945623",
      appId: "1:350376945623:web:eb884eb5cdac3f05aa0d92"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==========================================================
    // LOAD RESULT FROM LOCALSTORAGE
    // ==========================================================
    function loadResult() {
      const container = document.getElementById('resultContent');
      const resultJSON = localStorage.getItem('cpes_result');
      if (!resultJSON) {
        container.innerHTML = `
          <div class="no-result">
            <span class="material-symbols-rounded">hourglass_empty</span>
            <h3>No result found</h3>
            <p class="text-muted">Please complete a quiz first.</p>
          </div>
        `;
        return;
      }

      try {
        const result = JSON.parse(resultJSON);
        const { studentName, total, correct, wrong, score, grade, detailed, quizId, timestamp } = result;
        const percentage = Math.round((correct / total) * 100);

        // Fetch quiz title
        let quizTitle = 'Chemistry Quiz';
        db.collection('quizzes').doc(quizId).get().then(doc => {
          if (doc.exists) quizTitle = doc.data().title || 'Chemistry Quiz';
          renderResult(quizTitle);
        }).catch(() => renderResult(quizTitle));

        function renderResult(title) {
          // Build question review
          let reviewHtml = '';
          if (detailed && detailed.length) {
            reviewHtml = '<div class="question-review"><h4>📝 Question Review</h4>';
            detailed.forEach((item, idx) => {
              const statusClass = item.isCorrect ? 'correct' : 'wrong';
              const statusText = item.isCorrect ? '✅ Correct' : '❌ Wrong';
              reviewHtml += `
                <div class="q-item">
                  <span><strong>Q${idx+1}</strong> (Your Answer: ${item.userAnswer !== undefined ? item.userAnswer : 'N/A'})</span>
                  <span class="status ${statusClass}">${statusText}</span>
                </div>
              `;
            });
            reviewHtml += '</div>';
          }

          const dateStr = new Date(timestamp || Date.now()).toLocaleDateString('en-IN', {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
          });

          container.innerHTML = `
            <div class="result-score">${percentage}%</div>
            <div class="result-grade">${grade || 'N/A'}</div>
            <div class="result-details">
              <span class="correct"><strong>${correct}</strong> Correct</span>
              <span class="wrong"><strong>${wrong}</strong> Wrong</span>
              <span class="total"><strong>${total}</strong> Total</span>
            </div>
            <p style="color:var(--color-text-secondary);margin-bottom:12px;">
              ${percentage >= 70 ? '🎉 Excellent! You\'ve passed with flying colors.' :
                percentage >= 40 ? '👍 Good effort! Keep practicing.' :
                '📚 Don\'t give up! Review and try again.'}
            </p>
            ${reviewHtml}

            <!-- ============================================= -->
            <!-- NEW CERTIFICATE DESIGN -->
            <!-- ============================================= -->
            <div class="certificate-wrapper" id="certificateWrapper">
              <div class="certificate-box" id="certificateBox">

                <!-- Top decoration -->
                <div class="cert-top-decoration">
                  <span class="cert-logo">⚗️</span>
                  <span class="cert-serial">#CPES-${String(Date.now()).slice(-6)}</span>
                </div>

                <!-- Institute Name -->
                <div class="cert-institute">
                  Chemistry Point <span>⚡</span>
                </div>
                <div class="cert-subtitle">by Pradeep Sir</div>

                <!-- Main Title -->
                <div class="cert-main-title">Certificate of Completion</div>

                <!-- Student Name -->
                <div class="cert-student-name">${studentName || 'Student'}</div>

                <!-- Completion Text -->
                <div class="cert-completion-text">
                  has successfully completed the <strong>${title}</strong>
                </div>

                <!-- Details Row -->
                <div class="cert-details-row">
                  <span>📊 Score: <strong>${percentage}%</strong></span>
                  <span>✅ Correct: <strong>${correct}</strong></span>
                  <span>📅 Date: <strong>${dateStr}</strong></span>
                </div>

                <!-- Grade Badge -->
                <div class="cert-grade-badge">Grade: ${grade || 'N/A'}</div>

                <!-- Footer -->
                <div class="cert-footer">
                  <div class="cert-director">
                    👨‍🏫 Pradeep Sir
                    <small>Director, Chemistry Point</small>
                  </div>
                  <div class="cert-seal">🏅</div>
                  <div class="cert-date">Issued: ${dateStr}</div>
                </div>

                <!-- Stamp -->
                <div class="cert-stamp">Chemistry Point<br>Pradeep Sir</div>

              </div>
            </div>

            <div class="cert-actions">
              <button class="btn btn--primary" onclick="downloadPNG()">
                <span class="material-symbols-rounded">image</span> Download PNG
              </button>
              <button class="btn btn--primary" onclick="downloadPDF()">
                <span class="material-symbols-rounded">picture_as_pdf</span> Download PDF
              </button>
            </div>
          `;
        }
      } catch (e) {
        container.innerHTML = `<p style="color:var(--color-danger);">Error loading result: ${e.message}</p>`;
      }
    }

    // ==========================================================
    // DOWNLOAD FUNCTIONS
    // ==========================================================
    function downloadPNG() {
      const el = document.getElementById('certificateBox');
      html2canvas(el, {
        scale: 2.5,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
        width: el.scrollWidth,
        height: el.scrollHeight,
        windowWidth: el.scrollWidth,
        windowHeight: el.scrollHeight
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Certificate_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(err => alert('PNG error: ' + err.message));
    }

    function downloadPDF() {
      const el = document.getElementById('certificateBox');
      html2canvas(el, {
        scale: 2.5,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
        width: el.scrollWidth,
        height: el.scrollHeight,
        windowWidth: el.scrollWidth,
        windowHeight: el.scrollHeight
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');
        const imgWidth = 280;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        const x = (297 - imgWidth) / 2;
        const y = (210 - imgHeight) / 2;
        pdf.addImage(imgData, 'PNG', x, y, imgWidth, imgHeight);
        pdf.save(`Certificate_${Date.now()}.pdf`);
      }).catch(err => alert('PDF error: ' + err.message));
    }

    // ==========================================================
    // INIT
    // ==========================================================
    loadResult();
  </script>
</body>
</html>
